<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Crescimento Digital - Moma Móveis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Chosen Palette: Warm Neutrals & Terracotta -->
    <!-- Application Structure Plan: A narrative, single-page dashboard structure. It starts with macro market data to hook the user, delves into customer psychology with interactive charts, presents the customer journey as a clear, clickable 3-step process, and features an interactive phase-selector for the action plan. This structure transforms a linear report into an exploratory tool, allowing decision-makers to easily grasp the core concepts and compare investment scenarios, thus enhancing engagement and understanding. -->
    <!-- Visualization & Content Choices: 
    - Market Stats (Growth/Revenue): Goal: Inform/Impress -> Method: Large dynamic text counters -> Interaction: Numbers animate on load -> Justification: Creates an immediate 'wow' factor and highlights key opportunities.
    - Online Research (6/10): Goal: Inform -> Method: HTML/CSS icon grid -> Interaction: Static visual -> Justification: Simple, visual, and effective representation of a key statistic.
    - Customer Priorities (Personality/Quality/Durability): Goal: Compare -> Method: Doughnut Chart (Chart.js) -> Interaction: Hover to see details -> Justification: Visually compelling way to show proportions and priorities.
    - Customer Journey: Goal: Organize -> Method: Interactive Tabs/Stepper -> Interaction: Click to reveal content for each step -> Justification: Breaks down the process into focused, digestible chunks.
    - Action Plan: Goal: Compare/Organize -> Method: Interactive Buttons -> Interaction: Click to switch between phases and see corresponding investment/focus -> Justification: Allows direct comparison of strategic options, critical for decision making.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8F7F4;
            color: #4A4A4A;
        }
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 350px;
        }
        @media (min-width: 768px) {
            .chart-container {
                height: 350px;
                max-height: 400px;
            }
        }
        .brand-heading {
            color: #A97C50;
        }
        .brand-bg {
            background-color: #A97C50;
        }
        .brand-bg-light {
            background-color: #D3B89E;
        }
        .brand-border {
            border-color: #A97C50;
        }
        .nav-link.active {
            background-color: #A97C50;
            color: white;
        }
        .phase-button.active {
            background-color: #A97C50;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        .journey-tab.active {
            border-color: #A97C50;
            background-color: white;
            color: #A97C50;
        }
    </style>
</head>
<body class="antialiased">
Repositório de Materiais
</body>
</html>
